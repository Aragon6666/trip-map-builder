<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>长沙 3晚4天雨天轻松情侣行</title>
<meta name="description" content="高铁往返长沙，桔子酒店优先，五一广场住宿中心，雨天室内优先，湖南博物院、岳麓窗口、影像馆/美术馆、茶颜悦色与少辣美食。">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./trip_data.js"></script>
<style>
:root {
  --bg:#f5f5f7; --card:#fff; --text:#1d1d1f; --muted:#6e6e73; --line:rgba(60,60,67,.14);
  --spot:#007aff; --food:#ff3b30; --tea:#8b5cf6; --hotel:#ff9500; --transport:#64748b; --indoor:#14b8a6; --active:#111827;
}
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); letter-spacing:0; }
#map { height:42vh; min-height:300px; position:sticky; top:0; z-index:2; background:#dfe7ef; }
.tabs { position:sticky; top:42vh; z-index:3; display:flex; gap:8px; overflow:auto; padding:12px 14px; background:rgba(255,255,255,.92); backdrop-filter:blur(16px); border-bottom:1px solid var(--line); }
.tabs::-webkit-scrollbar { display:none; }
.tab { border:0; border-radius:999px; padding:8px 14px; background:#ececf0; color:var(--muted); font-weight:700; white-space:nowrap; cursor:pointer; }
.tab.active { background:#007aff; color:#fff; }
.content { max-width:760px; margin:0 auto; padding:18px 16px 34px; }
.hero { padding:22px 2px 14px; }
.hero h1 { margin:0 0 8px; font-size:28px; line-height:1.15; }
.hero p { margin:0; color:var(--muted); line-height:1.55; }
.grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin:14px 0 18px; }
.info,.card,.route,.weather,.pack,.legend { background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.info { padding:14px; }
.label { color:var(--muted); font-size:12px; font-weight:800; margin-bottom:5px; }
.value { font-weight:700; line-height:1.45; font-size:14px; }
.section { margin:22px 0 8px; color:var(--muted); font-size:13px; font-weight:900; }
.day-head { padding:8px 0 10px; }
.day-head h2 { margin:0 0 4px; font-size:23px; }
.day-head p { margin:0; color:var(--muted); line-height:1.5; }
.route { padding:12px 14px; color:var(--muted); line-height:1.6; font-size:14px; margin-bottom:14px; }
.timeline { position:relative; padding-left:24px; }
.timeline:before { content:""; position:absolute; left:8px; top:14px; bottom:14px; width:2px; background:var(--line); }
.item { position:relative; margin:0 0 10px; }
.dot { position:absolute; left:-22px; top:18px; width:12px; height:12px; border-radius:50%; border:2px solid var(--bg); }
.type-food { background:var(--food); } .type-spot { background:var(--spot); } .type-hotel { background:var(--hotel); } .type-tea { background:var(--tea); } .type-transport { background:var(--transport); } .type-indoor { background:var(--indoor); }
.card { padding:14px 15px; cursor:pointer; transition:border-color .18s, box-shadow .18s, transform .18s; }
.card.active { border-color:var(--active); box-shadow:0 0 0 2px rgba(17,24,39,.16), 0 6px 18px rgba(0,0,0,.08); transform:translateY(-1px); }
.time { color:#a0a0a6; font-size:12px; font-weight:800; display:flex; align-items:center; gap:6px; }
.seq { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:999px; background:#111827; color:#fff; font-size:12px; font-weight:900; }
.name { margin-top:4px; font-size:17px; font-weight:800; }
.desc { margin-top:4px; color:var(--muted); font-size:14px; line-height:1.55; }
.budget { display:inline-block; margin-top:8px; background:#f2f2f7; color:var(--muted); border-radius:8px; padding:4px 8px; font-size:12px; font-weight:700; }
.detail { margin-top:10px; padding-top:10px; border-top:1px solid var(--line); color:var(--muted); font-size:13px; line-height:1.65; }
.links { margin-top:10px; display:flex; flex-wrap:wrap; gap:8px; }
.btn { border:0; border-radius:8px; padding:8px 11px; color:#fff; font-size:13px; font-weight:800; text-decoration:none; }
.nav { background:#007aff; } .xhs { background:#ff2442; } .dp { background:#ffa700; } .rsv { background:#34c759; }
.legend { display:flex; flex-wrap:wrap; gap:10px; padding:12px 14px; font-size:13px; color:var(--muted); }
.legend span { display:inline-flex; align-items:center; gap:6px; }
.legend i { display:inline-block; width:10px; height:10px; border-radius:50%; }
.weather,.pack { padding:13px 15px; margin-bottom:10px; line-height:1.6; }
.weather b { display:block; margin-bottom:4px; }
.pack { display:flex; gap:10px; }
.box { width:18px; height:18px; flex:0 0 auto; border:2px solid var(--line); border-radius:5px; margin-top:2px; }
.pack.important .box { border-color:var(--hotel); background:rgba(255,149,0,.12); }
.warn { color:#bf5b00; }
.route-marker { border:none; background:transparent; }
.marker-pin { min-width:32px; height:32px; padding:0 7px; border-radius:999px; border:3px solid #fff; display:flex; align-items:center; justify-content:center; gap:2px; color:#fff; font-size:12px; font-weight:900; box-shadow:0 2px 9px rgba(0,0,0,.24); transform-origin:center; transition:transform .18s, box-shadow .18s; }
.marker-pin.active { transform:scale(1.24); box-shadow:0 0 0 5px rgba(17,24,39,.20), 0 5px 16px rgba(0,0,0,.28); }
.route-arrow { color:#111827; font-size:18px; font-weight:900; text-shadow:0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff; }
@media (max-width:520px) { .grid { grid-template-columns:1fr; } .hero h1 { font-size:25px; } }
</style>
</head>
<body>
<div id="map"></div>
<div id="tabs" class="tabs"></div>
<main id="content" class="content"></main>
<script>
const TYPE_META = {
  hotel: { label:'住宿', color:'#ff9500', short:'宿' },
  spot: { label:'景点', color:'#007aff', short:'景' },
  indoor: { label:'室内', color:'#14b8a6', short:'室' },
  food: { label:'餐馆', color:'#ff3b30', short:'餐' },
  tea: { label:'茶颜', color:'#8b5cf6', short:'茶' },
  transport: { label:'交通', color:'#64748b', short:'行' }
};
const map = L.map('map', { center:[HOTEL.lat,HOTEL.lng], zoom:12, zoomControl:false });
L.control.zoom({ position:'topright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom:19, attribution:'&copy; OpenStreetMap &copy; CARTO' }).addTo(map);
let layers = [];
let markerByKey = {};
let activeKey = null;

function esc(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function locKey(dayId, index){ return `${dayId}-${index}`; }
function meta(type){ return TYPE_META[type] || TYPE_META.spot; }
function clearMap(){ layers.forEach(l=>map.removeLayer(l)); layers=[]; markerByKey={}; activeKey=null; }
function navUrl(loc){ return `https://uri.amap.com/marker?position=${loc.lng},${loc.lat}&name=${encodeURIComponent(loc.name)}&coordinate=wgs84&callnative=1`; }
function xhsUrl(loc){ return `https://www.xiaohongshu.com/search_result?keyword=${encodeURIComponent(loc.xhsKeyword||loc.name)}&source=web_explore_feed`; }
function dpUrl(loc){ return `https://m.dianping.com/searchshop?keyword=${encodeURIComponent(loc.dianpingKeyword||loc.name)}`; }
function routeLocs(day){ return (day.locations||[]).filter(l => l.time !== '—' && l.lat && l.lng); }
function markerIcon(loc, seq, active=false) {
  const m = meta(loc.type);
  return L.divIcon({
    className:'route-marker',
    html:`<div class="marker-pin ${active?'active':''}" style="background:${m.color}"><span>${seq}</span><span>${m.short}</span></div>`,
    iconSize:[36,36],
    iconAnchor:[18,18],
    popupAnchor:[0,-18]
  });
}
function arrowIcon() {
  return L.divIcon({ className:'route-marker', html:'<div class="route-arrow">→</div>', iconSize:[24,24], iconAnchor:[12,12] });
}
function midPoint(a,b){ return [(a[0]+b[0])/2, (a[1]+b[1])/2]; }
function popupHtml(loc, seq) {
  return `<b>${seq}. ${esc(loc.name)}</b><br><span style="color:#86868b">${esc(loc.time)}</span><br>${esc(loc.desc)}${loc.budget?'<br><span style="color:#ff9500">'+esc(loc.budget)+'</span>':''}<br><a href="${navUrl(loc)}" target="_blank">高德导航</a>`;
}
function setActive(key, opts={}) {
  if(activeKey && markerByKey[activeKey]) {
    const old = markerByKey[activeKey];
    old.marker.setIcon(markerIcon(old.loc, old.seq, false));
  }
  document.querySelectorAll('.card.active').forEach(c => c.classList.remove('active'));
  activeKey = key;
  const item = markerByKey[key];
  if(item) {
    item.marker.setIcon(markerIcon(item.loc, item.seq, true));
    item.marker.openPopup();
    map.setView([item.loc.lat,item.loc.lng], Math.max(map.getZoom(), 14), { animate:true });
  }
  const card = document.querySelector(`[data-loc-key="${key}"]`);
  if(card) {
    card.classList.add('active');
    if(opts.scrollCard) card.scrollIntoView({ behavior:'smooth', block:'center' });
  }
}
function showMap(id){
  clearMap();
  const day = DAYS.find(d=>d.id===id);
  const all = id===0 ? DAYS.slice(1).flatMap(d => routeLocs(d).map((loc,i)=>({day:d, loc, i}))) : routeLocs(day).map((loc,i)=>({day, loc, i}));
  const pts = [];
  all.forEach(({day, loc, i}) => {
    const key = locKey(day.id, i);
    const seq = id===0 ? day.label.replace(/\s.*/, '') : i + 1;
    const marker = L.marker([loc.lat,loc.lng], { icon:markerIcon(loc, seq) }).addTo(map);
    marker.bindPopup(popupHtml(loc, seq));
    marker.on('click', () => setActive(key, { scrollCard:true }));
    markerByKey[key] = { marker, loc, seq };
    layers.push(marker);
    pts.push([loc.lat,loc.lng]);
  });
  if(id!==0 && pts.length>1) {
    const line = L.polyline(pts,{color:'#111827',weight:3,opacity:.58,dashArray:'8 7'}).addTo(map);
    layers.push(line);
    for(let i=0;i<pts.length-1;i++) {
      const arrow = L.marker(midPoint(pts[i], pts[i+1]), { icon:arrowIcon(), interactive:false }).addTo(map);
      layers.push(arrow);
    }
  }
  if(pts.length) map.fitBounds(pts,{padding:[36,36],maxZoom:14}); else map.setView([HOTEL.lat,HOTEL.lng],12);
}
function typeDot(type){ return `<span class="dot type-${type}"></span>`; }
function locCard(loc, dayId, index){
  const key = locKey(dayId, index);
  const xhs = loc.xhsKeyword ? `<a class="btn xhs" href="${xhsUrl(loc)}" target="_blank" onclick="event.stopPropagation()">小红书</a>` : '';
  const dp = (loc.type==='food'||loc.type==='tea'||loc.dianpingKeyword) ? `<a class="btn dp" href="${dpUrl(loc)}" target="_blank" onclick="event.stopPropagation()">大众点评</a>` : '';
  const rsv = loc.reserve ? `<a class="btn rsv" href="${loc.reserve}" target="_blank" onclick="event.stopPropagation()">预约</a>` : '';
  return `<div class="item">${typeDot(loc.type)}<div class="card" data-loc-key="${key}">
    <div class="time"><span class="seq">${index+1}</span>${loc.time==='—'?'备选':esc(loc.time)} · ${meta(loc.type).label}</div>
    <div class="name">${esc(loc.name)}</div>
    <div class="desc">${esc(loc.desc)}</div>
    ${loc.budget?`<div class="budget">${esc(loc.budget)}</div>`:''}
    <div class="links"><a class="btn nav" href="${navUrl(loc)}" target="_blank" onclick="event.stopPropagation()">高德导航</a>${xhs}${dp}${rsv}</div>
    ${loc.detail?`<div class="detail">${esc(loc.detail)}</div>`:''}
  </div></div>`;
}
function legend(){
  return `<div class="legend">${Object.values(TYPE_META).map(t=>`<span><i style="background:${t.color}"></i>${t.label}</span>`).join('')}</div>`;
}
function overview(){
  return `<div class="hero"><h1>${esc(TRIP.title)}</h1><p>${esc(TRIP.subtitle)}</p></div>
  <div class="grid">
    <div class="info"><div class="label">住宿</div><div class="value">${esc(TRIP.hotelSummary)}</div></div>
    <div class="info"><div class="label">交通</div><div class="value">${esc(TRIP.transport)}</div></div>
    <div class="info"><div class="label">餐饮</div><div class="value">${esc(TRIP.foodSummary)}</div></div>
    <div class="info"><div class="label">预算</div><div class="value">${esc(TRIP.budgetSummary)}</div></div>
  </div>
  <div class="section">地图图例</div>${legend()}
  <div class="section">行程概览</div>
  ${DAYS.slice(1,5).map(d=>`<div class="card" data-go-day="${d.id}" style="margin-bottom:8px"><div class="name">${esc(d.label)} · ${esc(d.title)}</div><div class="desc">${esc(d.date)}</div></div>`).join('')}
  <div class="section">天气提醒</div>
  <div class="weather"><b>强降雨版本</b>6/20-6/22 降雨风险高，户外点均按雨小窗口处理；最后一天只吃饭返程。</div>`;
}
function renderPacking(d) {
  return `<div class="day-head"><h2>${esc(d.title)}</h2><p>${esc(d.date)}</p></div>
  <div class="section">每日天气与行程调整</div>
  ${WEATHER.map(w=>`<div class="weather"><b>${esc(w.date)}</b>${esc(w.summary)}<br><span class="warn">${esc(w.impact)}</span></div>`).join('')}
  <div class="section">行李待办</div>
  ${PACKING.map(p=>`<div class="pack ${p.important?'important':''}"><span class="box"></span><span>${p.text}</span></div>`).join('')}
  <div class="weather">${esc(TRIP.sourceNote)} 天气会变化，出发前 1-2 天请再次复核。</div>`;
}
function renderDay(id){
  const d = DAYS.find(x=>x.id===id);
  if(d.type==='packing') return renderPacking(d);
  const main = routeLocs(d);
  const alt = (d.locations||[]).filter(l=>l.time==='—');
  return `<div class="day-head"><h2>${esc(d.title)}</h2><p>${esc(d.date)}</p></div>
  <div class="route"><b>路线：</b>${esc(d.route||'')}<br><span class="warn">地图上的数字对应下方行程顺序，点击行程卡片会高亮地图点。</span></div>
  <div class="section">地图图例</div>${legend()}
  <div class="section">行程</div><div class="timeline">${main.map((loc,i)=>locCard(loc,id,i)).join('')}</div>
  ${alt.length?`<div class="section">备选</div><div class="timeline">${alt.map((loc,i)=>locCard(loc,id,main.length+i)).join('')}</div>`:''}`;
}
const tabs = document.getElementById('tabs');
const content = document.getElementById('content');
DAYS.forEach(d => {
  const btn=document.createElement('button');
  btn.className='tab';
  btn.dataset.id=d.id;
  btn.textContent=d.label;
  btn.onclick=()=>go(d.id);
  tabs.appendChild(btn);
});
function go(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', Number(t.dataset.id)===id));
  document.getElementById('content').innerHTML = id===0 ? overview() : renderDay(id);
  showMap(id);
  const tab = document.querySelector(`.tab[data-id="${id}"]`);
  if(tab) tab.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}
content.addEventListener('click', e => {
  if(e.target.closest('.links,.btn')) return;
  const locCard = e.target.closest('[data-loc-key]');
  if(locCard) { setActive(locCard.dataset.locKey); return; }
  const dayCard = e.target.closest('[data-go-day]');
  if(dayCard) go(Number(dayCard.dataset.goDay));
});
window.go = go;
window.setActive = setActive;
go(0);
</script>
</body>
</html>
